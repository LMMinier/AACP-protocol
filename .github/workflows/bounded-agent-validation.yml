name: Bounded-agent artifact validation

on:
  push:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "papers/bounded-agent-paper.md"
      - ".github/workflows/bounded-agent-validation.yml"
  pull_request:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "papers/bounded-agent-paper.md"
      - ".github/workflows/bounded-agent-validation.yml"

jobs:
  harness:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile benchmark code
        run: python -m compileall -q benchmarks

      - name: Run deterministic harness self-test
        working-directory: benchmarks
        run: python measure_bounded_agent.py --self-test

      - name: Run harness unit tests
        working-directory: benchmarks
        run: python -m unittest -v test_measure_bounded_agent.py

      - name: Validate example configuration
        run: python -m json.tool benchmarks/bounded_agent_config.example.json > /dev/null
